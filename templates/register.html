{% extends "layout.html" %}

{% block title %}Register | DataGoal{% endblock %}

{% block main %}
<section class="auth-shell">
    <div class="card auth-card">
        <div class="page-heading">
            <span class="eyebrow">Create Account</span>
            <h2>Register</h2>
            <p>Start saving predictions, reviewing match logic, and building your insights history.</p>
        </div>

        <form action="{{ url_for('register') }}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input class="form-control" id="username" name="username" type="text" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" required>
            </div>

            <div class="form-group">
                <label for="confirmation">Confirm Password</label>
                <input class="form-control" id="confirmation" name="confirmation" type="password" required>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">Register</button>
                <a href="{{ url_for('login') }}" class="btn btn-secondary">Go to Login</a>
            </div>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>.
        </p>
    </div>
</section>
{% endblock %}
