<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataGoal Predictor</title>
</head>
<body>
    <h1>⚽ Match Predictor</h1>
    <p>Enter recent form stats for two teams.</p>

    <form method="POST">
        <h3>Home Team</h3>
        <input type="text" name="home_team" placeholder="Home team name" required><br><br>
        <input type="number" name="home_wins" placeholder="Wins in last 5" min="0" max="5" required><br><br>
        <input type="number" name="home_goals_for" placeholder="Goals scored in last 5" min="0" required><br><br>
        <input type="number" name="home_goals_against" placeholder="Goals conceded in last 5" min="0" required><br><br>

        <h3>Away Team</h3>
        <input type="text" name="away_team" placeholder="Away team name" required><br><br>
        <input type="number" name="away_wins" placeholder="Wins in last 5" min="0" max="5" required><br><br>
        <input type="number" name="away_goals_for" placeholder="Goals scored in last 5" min="0" required><br><br>
        <input type="number" name="away_goals_against" placeholder="Goals conceded in last 5" min="0" required><br><br>

        <button type="submit">Predict Match</button>
    </form>

    <br>
    <a href="/">Back Home</a>
</body>
</html>
