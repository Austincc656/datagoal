<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS50 Project Intro</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #071833;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: min(900px, 90%);
            background: #1d2b45;
            border: 1px solid #22314a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .eyebrow {
            color: #22c55e;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 48px;
            line-height: 1.1;
        }

        p.subtitle {
            margin: 0 0 28px;
            font-size: 22px;
            color: #cbd5e1;
        }

        .details {
            display: grid;
            gap: 14px;
            font-size: 22px;
        }

        .row strong {
            color: #22c55e;
            display: inline-block;
            min-width: 180px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">CS50 Final Project</div>
        <h1>DataGoal: Beyond the Scoreline</h1>
        <p class="subtitle">Football analytics with live match intelligence and explainable predictions</p>

        <div class="details">
            <div class="row"><strong>Name:</strong> Eronmosele Austin Oboh</div>
            <div class="row"><strong>GitHub:</strong> Austincc656</div>
            <div class="row"><strong>edX:</strong> Austinerons01</div>
            <div class="row"><strong>Location:</strong> Biberach, Germany</div>
            <div class="row"><strong>Date:</strong> 25 March 2026</div>
        </div>
    </div>
</body>
</html>
